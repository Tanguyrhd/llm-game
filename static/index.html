<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Prompt Heist</title>
<link rel="stylesheet" href="style.css">
<style>
  header { margin-bottom: 2rem; }
  .prompt-line {
    color: var(--green-dim);
    font-size: 0.95rem;
    margin-bottom: 0.25rem;
  }
  h1 {
    font-size: 2.4rem;
    margin: 0;
  }
  h1 .cursor {
    display: inline-block;
    width: 0.55em;
    background: var(--green);
    animation: blink 1s step-end infinite;
    margin-left: 0.1em;
  }
  @keyframes blink { 50% { opacity: 0; } }
  p.tagline {
    color: var(--green-dim);
    margin-top: 0.5rem;
  }
  #missions {
    display: flex;
    flex-direction: column;
    gap: 0.9rem;
    margin-top: 1.5rem;
  }
  .mission-card {
    display: block;
    text-decoration: none;
    color: inherit;
    position: relative;
    padding-left: 2rem;
  }
  .mission-card::before {
    content: '>';
    position: absolute;
    left: 0.85rem;
    color: var(--green);
    opacity: 0;
    transition: opacity 0.15s;
  }
  .mission-card:hover::before { opacity: 1; }
  .mission-card:hover {
    box-shadow: 0 0 18px var(--green-glow), inset 0 0 30px rgba(0, 0, 0, 0.5);
    border-color: var(--green);
  }
  .mission-card h2 {
    margin: 0 0 0.4rem;
    font-size: 1.3rem;
    color: var(--bright);
  }
  .mission-card p {
    margin: 0;
    color: var(--green-dim);
  }
  footer {
    margin-top: 2.5rem;
    color: var(--green-dim);
    font-size: 0.8rem;
  }
</style>
</head>
<body>
  <header>
    <p class="prompt-line">root@mainframe:~$ ./launch_prompt_heist</p>
    <h1>PROMPT_HEIST<span class="cursor">&nbsp;</span></h1>
    <p class="tagline">// Learn how LLMs work by testing, breaking, and analyzing them.</p>
  </header>

  <div id="missions" class="panel">Loading missions&hellip;</div>

  <footer>&gt; select a target to begin infiltration_</footer>

<script src="matrix-rain.js"></script>
<script>
  async function loadMissions() {
    const container = document.getElementById('missions');
    const res = await fetch('/api/mission-groups');
    const groups = await res.json();
    container.innerHTML = '';
    container.classList.remove('panel');
    for (const group of groups) {
      const defaultMission = group.difficulties[0];
      const link = document.createElement('a');
      link.className = 'mission-card panel';
      link.href = `/mission.html?mission=${encodeURIComponent(group.id)}`;
      link.innerHTML = `<h2>${group.title}</h2><p>${defaultMission.objective}</p>`;
      container.appendChild(link);
    }
  }

  loadMissions();
</script>
</body>
</html>
