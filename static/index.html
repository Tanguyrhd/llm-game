<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Prompt Heist</title>
<style>
  body {
    font-family: system-ui, sans-serif;
    max-width: 640px;
    margin: 2rem auto;
    padding: 0 1rem;
    background: #0f1115;
    color: #e6e6e6;
  }
  h1 { font-size: 1.6rem; }
  p.tagline { color: #9aa0a8; margin-top: -0.5rem; }
  #missions {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    margin-top: 1.5rem;
  }
  .mission-card {
    display: block;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 1rem;
    background: #161a22;
    color: inherit;
    text-decoration: none;
  }
  .mission-card:hover { border-color: #2f6fdb; }
  .mission-card h2 { margin: 0 0 0.4rem; font-size: 1.1rem; color: #7fd6ff; }
  .mission-card p { margin: 0; color: #cfd3d9; }
</style>
</head>
<body>
  <h1>Prompt Heist</h1>
  <p class="tagline">Learn how LLMs work by testing, breaking, and analyzing them.</p>

  <div id="missions">Loading missions…</div>

<script>
  async function loadMissions() {
    const container = document.getElementById('missions');
    const res = await fetch('/api/mission-groups');
    const groups = await res.json();
    container.innerHTML = '';
    for (const group of groups) {
      const defaultMission = group.difficulties[0];
      const link = document.createElement('a');
      link.className = 'mission-card';
      link.href = `/mission.html?mission=${encodeURIComponent(group.id)}`;
      link.innerHTML = `<h2>${group.title}</h2><p>${defaultMission.objective}</p>`;
      container.appendChild(link);
    }
  }

  loadMissions();
</script>
</body>
</html>
