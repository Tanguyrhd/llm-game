<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Prompt Heist</title>
<link rel="stylesheet" href="style.css">
<style>
  #briefing { margin-bottom: 1.5rem; }
  #briefing h1 { font-size: 1.8rem; margin: 0 0 0.5rem; }
  #briefing p { margin: 0.4rem 0; }
  #story { color: var(--green-dim); }
  #objective { color: var(--bright); text-shadow: 0 0 6px var(--green-glow); }

  #difficulty-select { display: none; margin: 0.2rem 0 0.8rem; }

  #messages {
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
    height: 45vh;
    overflow-y: auto;
    margin-bottom: 1rem;
  }
  .msg {
    white-space: pre-wrap;
    line-height: 1.4;
  }
  .msg.user::before { content: 'YOU> '; color: var(--bright); font-weight: bold; }
  .msg.user { color: var(--bright); }
  .msg.assistant::before { content: 'TARGET> '; color: var(--green-dim); }
  .msg.assistant { color: var(--green); }
  .msg.error::before { content: 'ERROR> '; color: var(--red); }
  .msg.error { color: var(--red); font-style: italic; }

  #success-banner {
    display: none;
    margin-bottom: 1rem;
    border-color: var(--green);
    box-shadow: 0 0 20px var(--green-glow), inset 0 0 30px rgba(0, 0, 0, 0.5);
  }
  #success-banner strong {
    display: block;
    font-family: 'VT323', monospace;
    font-size: 1.6rem;
    letter-spacing: 0.08em;
    color: var(--bright);
    text-shadow: 0 0 10px var(--green-glow);
    margin-bottom: 0.4rem;
  }
  #explain-status { display: none; font-style: italic; color: var(--green-dim); }

  #chat-form {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }
  #chat-form::before {
    content: '>';
    color: var(--green);
  }
  #chat-input { flex: 1; }

  #hints-panel button { width: 100%; margin-bottom: 0.5rem; }
  .hint {
    margin-top: 0.6rem;
    padding: 0.5rem 0.75rem;
    border-left: 2px solid var(--green-dim);
    background: rgba(0, 0, 0, 0.4);
    color: var(--green-dim);
  }
  .hint.answer {
    border-left-color: var(--bright);
    color: var(--bright);
    text-shadow: 0 0 6px var(--green-glow);
  }
</style>
</head>
<body>
  <p><a href="/" class="back-link">&lt; return_to_grid</a></p>

  <div id="briefing" class="panel">
    <h1 id="title">Loading mission&hellip;</h1>
    <select id="difficulty-select"></select>
    <p id="story"></p>
    <p id="objective"></p>
  </div>

  <div id="messages" class="panel"></div>

  <div id="success-banner" class="panel">
    <strong>&gt;&gt; ACCESS GRANTED</strong>
    <p id="success-explanation"></p>
    <p id="explain-status">&gt; decrypting technique log&hellip;</p>
  </div>

  <form id="chat-form">
    <input id="chat-input" type="text" placeholder="enter transmission_" autocomplete="off">
    <button type="submit">Send</button>
  </form>

  <div id="hints-panel" class="panel">
    <button id="hint-button" type="button">Decrypt hint 1</button>
    <div id="hint-list"></div>
  </div>

<script src="matrix-rain.js"></script>
<script>
  let history = [];
  let missionSolved = false;
  let hintStage = 0;
  let missionHints = [];
  let missionAnswer = '';
  let activeMissionId = '';

  const messagesEl = document.getElementById('messages');
  const formEl = document.getElementById('chat-form');
  const inputEl = document.getElementById('chat-input');
  const bannerEl = document.getElementById('success-banner');
  const explanationEl = document.getElementById('success-explanation');
  const explainStatusEl = document.getElementById('explain-status');
  const hintsPanelEl = document.getElementById('hints-panel');
  const hintButtonEl = document.getElementById('hint-button');
  const hintListEl = document.getElementById('hint-list');
  const difficultySelectEl = document.getElementById('difficulty-select');

  function isNearBottom() {
    return messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 80;
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addMessage(role, content) {
    const shouldStick = isNearBottom();
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.textContent = content;
    messagesEl.appendChild(div);
    if (shouldStick) {
      scrollToBottom();
    }
  }

  const groupId = new URLSearchParams(window.location.search).get('mission') || 'secret-keeper';
  const DEFAULT_DIFFICULTY = 'medium';

  async function loadMissionGroup() {
    const res = await fetch('/api/mission-groups');
    const groups = await res.json();
    const group = groups.find((g) => g.id === groupId);
    if (!group) {
      document.getElementById('title').textContent = 'Mission not found';
      return;
    }

    if (group.difficulties.length > 1) {
      difficultySelectEl.style.display = 'inline-block';
      difficultySelectEl.innerHTML = group.difficulties
        .map((m) => `<option value="${m.id}">${m.difficulty}</option>`)
        .join('');
      const defaultMission =
        group.difficulties.find((m) => m.difficulty === DEFAULT_DIFFICULTY) || group.difficulties[0];
      difficultySelectEl.value = defaultMission.id;
    }

    applyMission(group.difficulties.find((m) => m.id === difficultySelectEl.value) || group.difficulties[0]);
  }

  function applyMission(mission) {
    activeMissionId = mission.id;
    document.title = `Prompt Heist — ${mission.title}`;
    document.getElementById('title').textContent = mission.title;
    document.getElementById('story').textContent = mission.story;
    document.getElementById('objective').textContent = 'Objective: ' + mission.objective;
    missionHints = mission.hints;
    missionAnswer = mission.answer_example;

    history = [];
    missionSolved = false;
    hintStage = 0;
    messagesEl.innerHTML = '';
    hintListEl.innerHTML = '';
    bannerEl.style.display = 'none';
    explainStatusEl.style.display = 'none';
    hintsPanelEl.style.display = 'block';
    inputEl.disabled = false;
    formEl.querySelector('button').disabled = false;
    renderHintButton();
  }

  difficultySelectEl.addEventListener('change', async () => {
    const res = await fetch('/api/mission-groups');
    const groups = await res.json();
    const group = groups.find((g) => g.id === groupId);
    const mission = group.difficulties.find((m) => m.id === difficultySelectEl.value);
    applyMission(mission);
  });

  function renderHintButton() {
    const labels = ['Decrypt hint 1', 'Decrypt hint 2', 'Decrypt hint 3', 'Reveal solution'];
    if (hintStage >= labels.length) {
      hintButtonEl.style.display = 'none';
      return;
    }
    hintButtonEl.textContent = labels[hintStage];
  }

  hintButtonEl.addEventListener('click', () => {
    const div = document.createElement('div');
    if (hintStage < missionHints.length) {
      div.className = 'hint';
      div.textContent = `Hint ${hintStage + 1}: ${missionHints[hintStage]}`;
    } else {
      div.className = 'hint answer';
      div.textContent = `Answer: ${missionAnswer}`;
    }
    hintListEl.appendChild(div);
    hintStage += 1;
    renderHintButton();
  });

  async function sendMessage(message) {
    history.push({ role: 'user', content: message });
    addMessage('user', message);

    const res = await fetch(`/api/chat/${activeMissionId}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ history: history.slice(0, -1), message }),
    });

    if (!res.ok) {
      const body = await res.json().catch(() => ({}));
      addMessage('error', body.detail || `Error: ${res.status}`);
      return;
    }

    const assistantEl = document.createElement('div');
    assistantEl.className = 'msg assistant';
    messagesEl.appendChild(assistantEl);

    let reply = '';
    let buffer = '';
    const reader = res.body.getReader();
    const decoder = new TextDecoder();

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line) continue;
        const event = JSON.parse(line);

        if (event.type === 'chunk') {
          const shouldStick = isNearBottom();
          reply += event.content;
          assistantEl.textContent = reply;
          if (shouldStick) {
            scrollToBottom();
          }
        } else if (event.type === 'error') {
          assistantEl.remove();
          addMessage('error', event.detail);
          return;
        } else if (event.type === 'done') {
          history.push({ role: 'assistant', content: reply });
          if (event.success) {
            missionSolved = true;
            explanationEl.textContent = event.explanation;
            bannerEl.style.display = 'block';
            bannerEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
            inputEl.disabled = true;
            formEl.querySelector('button').disabled = true;
            hintsPanelEl.style.display = 'none';
            fetchTailoredExplanation(message);
          }
        }
      }
    }
  }

  async function fetchTailoredExplanation(winningMessage) {
    explainStatusEl.style.display = 'block';
    try {
      const res = await fetch(`/api/explain/${activeMissionId}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: winningMessage }),
      });
      if (!res.ok) return;

      let explanation = '';
      let buffer = '';
      let firstChunk = true;
      const reader = res.body.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });

        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line) continue;
          const event = JSON.parse(line);
          if (event.type === 'chunk') {
            if (firstChunk) {
              explanation = '';
              explainStatusEl.style.display = 'none';
              firstChunk = false;
            }
            explanation += event.content;
            explanationEl.textContent = explanation;
          }
        }
      }
    } catch {
      // keep the generic explanation already shown
    } finally {
      explainStatusEl.style.display = 'none';
    }
  }

  formEl.addEventListener('submit', (e) => {
    e.preventDefault();
    if (missionSolved) return;
    const message = inputEl.value.trim();
    if (!message) return;
    inputEl.value = '';
    sendMessage(message);
  });

  loadMissionGroup();
</script>
</body>
</html>
